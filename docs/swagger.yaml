basePath: /
definitions:
  word-flashcard_internal_models.AccuracyBucket:
    properties:
      count:
        type: integer
      practice_count_breakdown:
        items:
          $ref: '#/definitions/word-flashcard_internal_models.PracticeCountBucket'
        type: array
      range:
        type: string
    type: object
  word-flashcard_internal_models.DefinitionInfo:
    properties:
      definition:
        type: string
      example:
        items:
          type: string
        type: array
    type: object
  word-flashcard_internal_models.DictionaryResponse:
    properties:
      meanings:
        items:
          $ref: '#/definitions/word-flashcard_internal_models.MeaningInfo'
        type: array
      phonetics:
        items:
          $ref: '#/definitions/word-flashcard_internal_models.PhoneticInfo'
        type: array
    type: object
  word-flashcard_internal_models.ErrorCode:
    enum:
    - invalid_request
    - validation_error
    - not_found
    - conflict
    - internal_error
    - upstream_unavailable
    type: string
    x-enum-varnames:
    - ErrCodeInvalidRequest
    - ErrCodeValidationError
    - ErrCodeNotFound
    - ErrCodeConflict
    - ErrCodeInternalError
    - ErrCodeUpstreamUnavailable
  word-flashcard_internal_models.ErrorResponse:
    properties:
      code:
        $ref: '#/definitions/word-flashcard_internal_models.ErrorCode'
      error:
        type: string
    type: object
  word-flashcard_internal_models.HealthResponse:
    properties:
      status:
        type: string
    type: object
  word-flashcard_internal_models.InformationResponse:
    properties:
      version:
        type: string
    type: object
  word-flashcard_internal_models.MeaningInfo:
    properties:
      definitions:
        items:
          $ref: '#/definitions/word-flashcard_internal_models.DefinitionInfo'
        type: array
      partOfSpeech:
        type: string
    type: object
  word-flashcard_internal_models.Note:
    properties:
      content:
        type: string
      id:
        type: integer
      sort_order:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  word-flashcard_internal_models.PhoneticInfo:
    properties:
      audio:
        type: string
      language:
        type: string
    type: object
  word-flashcard_internal_models.PracticeCountBucket:
    properties:
      count:
        type: integer
      range:
        type: string
    type: object
  word-flashcard_internal_models.Question:
    properties:
      answer:
        type: string
      count_failure_practise:
        type: integer
      count_practise:
        type: integer
      id:
        type: integer
      notes:
        type: string
      option_a:
        type: string
      option_b:
        type: string
      option_c:
        type: string
      option_d:
        type: string
      practiced:
        type: boolean
      question:
        type: string
      reference:
        type: string
      selected_option:
        type: string
    type: object
  word-flashcard_internal_models.QuestionAnswerLogEntry:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_correct:
        type: boolean
      selected_option:
        type: string
    type: object
  word-flashcard_internal_models.QuestionRandomRequest:
    properties:
      count:
        maximum: 1000
        minimum: 1
        type: integer
      exclude_recent_days:
        type: integer
    required:
    - count
    type: object
  word-flashcard_internal_models.QuestionStats:
    properties:
      accuracy_distribution:
        items:
          $ref: '#/definitions/word-flashcard_internal_models.AccuracyBucket'
        type: array
    type: object
  word-flashcard_internal_models.QuestionTrendPoint:
    properties:
      accuracy_rate:
        type: number
      date:
        type: string
      practice_count:
        type: integer
    type: object
  word-flashcard_internal_models.SearchCondition:
    properties:
      key:
        type: string
      operator:
        type: string
      value:
        type: string
    required:
    - key
    - operator
    type: object
  word-flashcard_internal_models.SearchFilter:
    properties:
      conditions:
        items:
          $ref: '#/definitions/word-flashcard_internal_models.SearchCondition'
        minItems: 1
        type: array
      logic:
        description: '"AND" or "OR"'
        type: string
    required:
    - conditions
    - logic
    type: object
  word-flashcard_internal_models.Word:
    properties:
      count_practise:
        type: integer
      definitions:
        items:
          $ref: '#/definitions/word-flashcard_internal_models.WordDefinition'
        type: array
      familiarity:
        type: string
      id:
        type: integer
      increment_count_practise:
        type: boolean
      reminder:
        type: string
      word:
        type: string
    type: object
  word-flashcard_internal_models.WordDefinition:
    properties:
      definition:
        type: string
      examples:
        items:
          type: string
        type: array
      id:
        type: integer
      notes:
        type: string
      part_of_speech:
        type: string
      phonetics:
        additionalProperties: true
        type: object
    type: object
  word-flashcard_internal_models.WordFamiliarityDistribution:
    properties:
      green:
        type: integer
      red:
        type: integer
      yellow:
        type: integer
    type: object
  word-flashcard_internal_models.WordPracticeLogEntry:
    properties:
      created_at:
        type: string
      familiarity:
        type: string
      id:
        type: integer
      previous_familiarity:
        type: string
    type: object
  word-flashcard_internal_models.WordRandomRequest:
    properties:
      count:
        maximum: 1000
        minimum: 1
        type: integer
      familiarity_levels:
        items:
          type: string
        type: array
      per_category_counts:
        additionalProperties:
          type: integer
        type: object
    required:
    - count
    type: object
  word-flashcard_internal_models.WordStats:
    properties:
      familiarity_distribution:
        $ref: '#/definitions/word-flashcard_internal_models.WordFamiliarityDistribution'
      practice_count_distribution:
        items:
          $ref: '#/definitions/word-flashcard_internal_models.PracticeCountBucket'
        type: array
    type: object
  word-flashcard_internal_models.WordTrendPoint:
    properties:
      avg_familiarity_score:
        type: number
      date:
        type: string
      improvement_rate:
        type: number
      practice_count:
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Flashcards help you learn more vocabulary anytime, anywhere.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Word Flashcard API
  version: "1.0"
paths:
  /api/dictionary/{word}:
    get:
      consumes:
      - application/json
      description: Get dictionary definition and pronunciation for a given word from
        Cambridge Dictionary API
      parameters:
      - description: Word to search for
        in: path
        name: word
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Dictionary definition found successfully
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.DictionaryResponse'
        "400":
          description: Bad request - Missing word parameter
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "404":
          description: Not found - Word not found in the dictionary
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "502":
          description: Bad gateway - Dictionary service unavailable
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      summary: Search dictionary for word definition
      tags:
      - dictionary
  /api/health:
    get:
      consumes:
      - application/json
      description: Returns server status to verify the service is running
      produces:
      - application/json
      responses:
        "200":
          description: Server is healthy
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.HealthResponse'
      summary: Health check endpoint
      tags:
      - health
  /api/information:
    get:
      consumes:
      - application/json
      description: Returns application version read from the root VERSION file
      produces:
      - application/json
      responses:
        "200":
          description: Application information
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.InformationResponse'
        "500":
          description: Internal server error - VERSION file not found or unreadable
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      summary: Application information endpoint
      tags:
      - health
  /api/notes:
    get:
      description: Get all notes, supports pagination and multi-column sorting through
        query parameters
      parameters:
      - description: 'Maximum number of records to return (default: 100, max: 1000)'
        in: query
        name: limit
        type: integer
      - description: 'Number of records to skip (default: 0)'
        in: query
        name: offset
        type: integer
      - description: 'Sort columns/expressions, comma-separated. Allowed: id,title,sort_order,created_at,updated_at'
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of notes retrieved successfully
          schema:
            items:
              $ref: '#/definitions/word-flashcard_internal_models.Note'
            type: array
        "400":
          description: Bad request - Invalid query parameters
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to fetch data from database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - notes
    post:
      consumes:
      - application/json
      description: Create a new note card entry
      parameters:
      - description: Note data to create
        in: body
        name: note
        required: true
        schema:
          $ref: '#/definitions/word-flashcard_internal_models.Note'
      produces:
      - application/json
      responses:
        "200":
          description: Note created successfully
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.Note'
        "400":
          description: Bad request - Invalid request body
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "409":
          description: Conflict - A note with this title already exists
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to insert data into database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - notes
  /api/notes/{id}:
    delete:
      description: Delete a specific note
      parameters:
      - description: Note ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Note deleted successfully
        "400":
          description: Bad request - Invalid note ID
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "404":
          description: Not found - Note not found
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to delete data from database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - notes
    get:
      description: Get a specific note by its ID
      parameters:
      - description: Note ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Note retrieved successfully
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.Note'
        "400":
          description: Bad request - Invalid note ID
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "404":
          description: Not found - Note not found
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to fetch data from database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - notes
    put:
      consumes:
      - application/json
      description: Update an existing note's properties
      parameters:
      - description: Note ID
        in: path
        name: id
        required: true
        type: integer
      - description: Note data to update
        in: body
        name: note
        required: true
        schema:
          $ref: '#/definitions/word-flashcard_internal_models.Note'
      produces:
      - application/json
      responses:
        "200":
          description: Note updated successfully
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.Note'
        "400":
          description: Bad request - Invalid note ID or request body
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "404":
          description: Not found - Note not found
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "409":
          description: Conflict - A note with this title already exists
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to update data in database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - notes
  /api/notes/count:
    get:
      description: Get the total count of notes in the database
      produces:
      - application/json
      responses:
        "200":
          description: Total count of notes
          schema:
            additionalProperties:
              format: int64
              type: integer
            type: object
        "500":
          description: Internal server error - Failed to count notes in database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - notes
  /api/notes/search:
    post:
      consumes:
      - application/json
      description: Search for notes using specified filter criteria. Supports equal,
        not equal, in, not in, like and other operations with pagination.
      parameters:
      - description: Search filter criteria
        in: body
        name: searchFilter
        required: true
        schema:
          $ref: '#/definitions/word-flashcard_internal_models.SearchFilter'
      - description: 'Maximum number of records to return (default: 100, max: 1000)'
        in: query
        name: limit
        type: integer
      - description: 'Number of records to skip (default: 0)'
        in: query
        name: offset
        type: integer
      - description: 'Sort columns/expressions, comma-separated. Allowed: id,title,sort_order,created_at,updated_at'
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Notes found matching the search criteria
          schema:
            items:
              $ref: '#/definitions/word-flashcard_internal_models.Note'
            type: array
        "400":
          description: Bad request - Invalid request body, filter, or query parameters
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to fetch data from database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - notes
  /api/questions:
    get:
      consumes:
      - application/json
      description: Get all questions, supports pagination and multi-column sorting
        through query parameters
      parameters:
      - description: 'Maximum number of records to return (default: 100, max: 1000)'
        in: query
        name: limit
        type: integer
      - description: 'Number of records to skip (default: 0)'
        in: query
        name: offset
        type: integer
      - description: 'Sort columns/expressions, comma-separated. Format: col,-col,(expr),-(expr).
          Allowed: id,question,answer,count_practise,count_failure_practise,created_at,updated_at'
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of Questions retrieved successfully
          schema:
            items:
              $ref: '#/definitions/word-flashcard_internal_models.Question'
            type: array
        "400":
          description: Bad request - Invalid query parameters
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to fetch data from database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - questions
    post:
      consumes:
      - application/json
      description: Create a new question entry
      parameters:
      - description: Question data to create
        in: body
        name: question
        required: true
        schema:
          $ref: '#/definitions/word-flashcard_internal_models.Question'
      produces:
      - application/json
      responses:
        "200":
          description: Question created successfully
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.Question'
        "400":
          description: Bad request - Invalid request body
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to insert data into database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - questions
  /api/questions/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a specific question
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: Question deleted successfully
        "400":
          description: Bad request - Invalid question ID
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "404":
          description: Not found - Question not found
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to delete data from database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - questions
    get:
      consumes:
      - application/json
      description: Get the question by its ID
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: A question retrieved successfully
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.Question'
        "400":
          description: Bad request - Invalid query parameters
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "404":
          description: Not found - Question not found
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to fetch data from database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - questions
    put:
      consumes:
      - application/json
      description: Update an existing question's properties like familiarity level
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: integer
      - description: Question data to update
        in: body
        name: question
        required: true
        schema:
          $ref: '#/definitions/word-flashcard_internal_models.Question'
      produces:
      - application/json
      responses:
        "200":
          description: Question updated successfully
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.Question'
        "400":
          description: Bad request - Invalid question ID or request body
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "404":
          description: Not found - Question not found
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to update data in database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - questions
  /api/questions/{id}/logs:
    get:
      description: Get the most recent answer log entries for a question, most recent
        first
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: integer
      - description: 'Maximum number of entries to return (default: 15, max: 50)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Recent answer log entries
          schema:
            items:
              $ref: '#/definitions/word-flashcard_internal_models.QuestionAnswerLogEntry'
            type: array
        "400":
          description: Bad request - Invalid question ID or limit parameter
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to fetch data from database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - questions
  /api/questions/count:
    get:
      consumes:
      - application/json
      description: Get the total count of questions in the database
      produces:
      - application/json
      responses:
        "200":
          description: Total count of questions
          schema:
            additionalProperties:
              format: int64
              type: integer
            type: object
        "500":
          description: Internal server error - Failed to count questions in database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - questions
  /api/questions/random:
    post:
      consumes:
      - application/json
      description: Randomly obtain the required number of questions
      parameters:
      - description: Random filter criteria including count and optional filter
        in: body
        name: randomFilter
        required: true
        schema:
          $ref: '#/definitions/word-flashcard_internal_models.QuestionRandomRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Random questions retrieved successfully
          schema:
            items:
              $ref: '#/definitions/word-flashcard_internal_models.Question'
            type: array
        "400":
          description: Bad request - Invalid request body or count parameter
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to fetch data from database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - questions
  /api/questions/stats:
    get:
      description: Get question count distribution by accuracy rate in 10% intervals,
        each bucket further broken down by practice count
      produces:
      - application/json
      responses:
        "200":
          description: Question accuracy distribution
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.QuestionStats'
        "500":
          description: Internal server error - Failed to fetch questions
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - questions
  /api/questions/trend:
    get:
      description: Get daily practice count / accuracy rate across all questions over
        the last N days, zero-filled for days with no activity
      parameters:
      - description: 'Number of days to include (default: 30, max: 90)'
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Daily trend points, ascending by date
          schema:
            items:
              $ref: '#/definitions/word-flashcard_internal_models.QuestionTrendPoint'
            type: array
        "400":
          description: Bad request - Invalid days parameter
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to fetch data from database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - questions
  /api/words:
    get:
      consumes:
      - application/json
      description: Get all words with their definitions and pronunciation information,
        supports pagination through query parameters
      parameters:
      - description: 'Maximum number of records to return (default: 100, max: 1000)'
        in: query
        name: limit
        type: integer
      - description: 'Number of records to skip (default: 0)'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of words retrieved successfully
          schema:
            items:
              $ref: '#/definitions/word-flashcard_internal_models.Word'
            type: array
        "400":
          description: Bad request - Invalid query parameters
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
        "500":
          description: Internal server error - Failed to fetch data from database
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.ErrorResponse'
      tags:
      - words
    post:
      consumes:
      - application/json
      description: Create a new word entry in the dictionary
      parameters:
      - description: Word data to create
        in: body
        name: word
        required: true
        schema:
          $ref: '#/definitions/word-flashcard_internal_models.Word'
      produces:
      - application/json
      responses:
        "200":
          description: Word created successfully
          schema:
            $ref: '#/definitions/word-flashcard_internal_models.Word'
        "400":
          description: Bad request - Invalid request body
          schema:
