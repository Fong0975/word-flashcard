name: Bump Frontend Version

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - '!web/package.json'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (major or minor)'
        required: true
        default: 'minor'
        type: choice
        options:
          - major
          - minor

concurrency:
  group: frontend-bump-version
  cancel-in-progress: false

jobs:
  bump-version:
    name: Bump package.json version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app_token.outputs.token }}
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Determine bump type
        id: bump_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.bump_type }}" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        run: |
          cd web
          npm version ${{ steps.bump_type.outputs.type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add web/package.json web/package-lock.json
          git commit -m "chore: bump frontend version to ${{ steps.version.outputs.new_version }} [skip ci]"
          git push
