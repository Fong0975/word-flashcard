name: Bump Version

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '!web/package.json'
      - '!web/package-lock.json'
      - '!VERSION'
      - '!utils/cambridge-dictionary-api/**'
      - '!.github/**'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (patch, minor, or major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      notes:
        description: 'Optional release notes (appended after version line)'
        required: false
        type: string

jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        if: github.event_name == 'push'
        with:
          fetch-depth: 2

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          token: ${{ github.token }}
          filters: |
            changed:
              - '**'
              - '!web/package.json'
              - '!web/package-lock.json'
              - '!VERSION'
              - '!utils/cambridge-dictionary-api/**'
              - '!.github/**'

  bump-version:
    name: Bump version
    needs: detect-changes
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.changed == 'true') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: bump-version
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app_token.outputs.token }}
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Bump version
        id: version
        run: |
          BUMP_TYPE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bump_type || 'patch' }}"
          OLD_VERSION=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_VERSION"
          if [ "$BUMP_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW_VERSION" > VERSION
          cd web
          npm version "$NEW_VERSION" --no-git-tag-version
          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build extra commit body
        id: extra_body
        env:
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
          MANUAL_NOTES: ${{ github.event.inputs.notes }}
        run: |
          EXTRA=""
          if [ "${{ github.event_name }}" = "push" ]; then
            EXTRA=$(echo "$COMMITS_JSON" | jq -r '.[].message | split("\n")[0]' | sed 's/^/- /')
          elif [ -n "$MANUAL_NOTES" ]; then
            EXTRA="$MANUAL_NOTES"
          fi
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "value<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo "${EXTRA}" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

      - name: Commit, push, and tag
        env:
          EXTRA_BODY: ${{ steps.extra_body.outputs.value }}
        run: |
          OLD="${{ steps.version.outputs.old_version }}"
          NEW="${{ steps.version.outputs.new_version }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add VERSION web/package.json web/package-lock.json
          BODY="- ${OLD} → ${NEW}"
          if [ -n "$EXTRA_BODY" ]; then
            BODY="${BODY}
${EXTRA_BODY}"
          fi
          git commit -m "chore: Bump version to v${NEW} [skip ci]" -m "${BODY}"
          git pull --rebase
          git push
          git tag "v${NEW}"
          git push origin "v${NEW}"
